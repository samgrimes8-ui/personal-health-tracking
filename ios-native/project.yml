name: MacroLens
options:
  bundleIdPrefix: app.macrolens.native
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    # 0.3.0 = first TestFlight release. Bump this for user-facing
    # releases (semver-ish — patch for bug fixes, minor for new
    # features, major for breaking UX changes).
    MARKETING_VERSION: "0.3.0"
    # Build number — testflight.sh auto-bumps this to git rev-list count
    # at archive time so each upload monotonically increases without
    # manual editing. The value here is just the floor.
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  MacroLens:
    type: application
    platform: iOS
    sources:
      - path: MacroLens
    info:
      path: MacroLens/Info.plist
      properties:
        CFBundleDisplayName: MacroLens
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: MacroLens uses the camera to capture meals, nutrition labels, barcodes, and InBody/DEXA scan reports for AI analysis.
        NSPhotoLibraryUsageDescription: MacroLens reads photos you select to analyze meals, recipes, nutrition labels, and InBody/DEXA scan reports.
        NSPhotoLibraryAddUsageDescription: MacroLens may save processed images back to your photo library.
        NSHealthShareUsageDescription: MacroLens reads your weight from Apple Health to keep your weigh-in history in sync across devices.
        NSHealthUpdateUsageDescription: MacroLens writes the meals you log and the weights you record to Apple Health so other apps can use them.
        # Background modes required for HKObserverQuery + enableBackgroundDelivery.
        # `fetch` covers the standard background-app-refresh path; `processing`
        # covers the longer HK observer callbacks. iOS won't deliver HK
        # background updates without these declared in Info.plist.
        UIBackgroundModes:
          - fetch
          - processing
        # Custom URL scheme for OAuth callbacks (Google sign-in via
        # ASWebAuthenticationSession). Supabase redirects to
        # `app.macrolens.native://login-callback#access_token=...&refresh_token=...`,
        # the system relaunches the app with that URL, and the auth
        # session callback parses the tokens and signs the user in.
        CFBundleURLTypes:
          - CFBundleURLName: app.macrolens.native
            CFBundleURLSchemes:
              - app.macrolens.native
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.macrolens.native
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        # Tells Xcode which AppIcon set in Assets.xcassets to use as the
        # app's home-screen icon. Required for App Store + TestFlight
        # submission — Apple rejects builds without a 1024x1024 marketing
        # icon (the universal-size entry covers all device variants).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Apple Developer team ID — baked in here so xcodegen regenerate
        # doesn't wipe the team selection every time. If you fork this
        # project, change to your own team ID (Xcode → Settings → Accounts
        # → click your team → "Team ID").
        DEVELOPMENT_TEAM: 86T54TVCFN
        CODE_SIGN_STYLE: Automatic
        # ───── Code-signing identity (per-config override) ─────
        # xcodegen's default is `CODE_SIGN_IDENTITY = "iPhone Developer"`
        # for BOTH configs, which forces development signing even when
        # archiving. We override per-config below so Release archives
        # pick the Apple Distribution cert (App Store + TestFlight)
        # while Debug keeps Apple Development for sim/device builds.
        # CODE_SIGN_STYLE stays Automatic so Xcode + the paid Dev
        # account fetch the matching profile via -allowProvisioningUpdates
        # — no manual profile management.
        # HealthKit entitlement is active for the two-way Apple Health
        # sync (push macros + weight, pull weight history). The
        # entitlement key is plain `com.apple.developer.healthkit`
        # (no `.access` array — adding `[]` triggered a "Verifiable
        # Health Records" provisioning error in earlier builds, and
        # we don't need any of the HKAccess special capabilities).
        #
        # Background delivery for bodyMass IS enabled at runtime via
        # HKHealthStore.enableBackgroundDelivery + an HKObserverQuery
        # — see HealthKitService.enableBackgroundWeightSync. The Info.plist
        # `UIBackgroundModes: [fetch, processing]` above is the iOS-side
        # requirement for those callbacks to actually fire.
        #
        # Sign In With Apple is intentionally NOT in this entitlements
        # file — that capability needs paid Apple Developer Program
        # enrollment too, but we haven't wired the auth flow on the
        # native side yet (Config.appleSignInEnabled is false). To
        # bring it back: re-add the `com.apple.developer.applesignin`
        # key to MacroLens.entitlements + flip the Config flag.
        CODE_SIGN_ENTITLEMENTS: MacroLens/MacroLens.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    entitlements:
      path: MacroLens/MacroLens.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: Supabase
        product: Supabase
