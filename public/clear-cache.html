<!DOCTYPE html>
<html>
<head><title>Clear Cache</title>
<style>body{background:#0f0e0d;color:#e8c547;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;gap:16px}</style>
</head>
<body>
<div style="font-size:24px">🧹 Clearing cache...</div>
<div id="status" style="font-size:14px;color:#888">Working...</div>
<script>
async function clear() {
  let count = 0;
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) { await r.unregister(); count++; }
    const keys = await caches.keys();
    for (const k of keys) { await caches.delete(k); count++; }
    document.getElementById('status').textContent = `Cleared ${count} items. Redirecting...`;
    document.getElementById('status').style.color = '#7ec8a0';
    setTimeout(() => { window.location.href = '/'; }, 1500);
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}
clear();
</script>
</body>
</html>
